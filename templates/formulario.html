<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Llamada — Supratech</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px;
      color: #fff;
    }

    .header {
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 14px 0;
    }
    .header .brand { font-weight: 700; font-size: 1em; color: rgba(255,255,255,0.9); }
    .header a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.8em; }
    .header a:hover { color: #fff; }

    /* ── CONTACT CARD ── */
    .contact-card {
      width: 100%;
      max-width: 560px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 22px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .contact-info .c-empresa { font-size: 1.1em; font-weight: 700; }
    .contact-info .c-meta    { font-size: 0.78em; color: rgba(255,255,255,0.55); margin-top: 3px; }

    .contact-actions { display: flex; gap: 10px; }
    .c-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.82em;
      text-decoration: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .c-btn-call { background: #28a745; color: #fff; }
    .c-btn-call:hover { background: #218838; }
    .c-btn-wa   { background: #25D366; color: #fff; }
    .c-btn-wa:hover { background: #1da851; }

    /* ── PROGRESS ── */
    .progress-wrap { width: 100%; max-width: 560px; margin-bottom: 16px; }
    .progress-steps {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
    }
    .step-dot {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      transition: background 0.3s;
    }
    .step-dot.done    { background: #4361ee; }
    .step-dot.active  { background: #f4a422; }
    .progress-label   { font-size: 0.72em; color: rgba(255,255,255,0.45); text-align: center; }

    /* ── STEP CARD ── */
    .step-card {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 20px;
      padding: 28px;
      color: #1a1a2e;
    }

    .step-number {
      display: inline-block;
      background: #4361ee;
      color: #fff;
      font-size: 0.7em;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 10px;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }

    .step-question { font-size: 1.1em; font-weight: 700; margin-bottom: 6px; color: #1a1a2e; }
    .step-hint     { font-size: 0.78em; color: #8d99ae; margin-bottom: 20px; line-height: 1.5; }

    /* Options */
    .options { display: flex; flex-direction: column; gap: 10px; }

    .option {
      padding: 13px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      cursor: pointer;
      font-size: 0.9em;
      font-weight: 500;
      color: #374151;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .option:hover   { border-color: #4361ee; color: #4361ee; background: #f8f9ff; }
    .option.selected { border-color: #4361ee; background: #4361ee; color: #fff; }
    .option .opt-icon { font-size: 1.1em; flex-shrink: 0; }

    /* Notas */
    .notas-wrap { margin-top: 16px; }
    .notas-wrap label { font-size: 0.78em; font-weight: 600; color: #6b7280; display: block; margin-bottom: 5px; }
    .notas-wrap textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.85em;
      resize: none;
      outline: none;
    }
    .notas-wrap textarea:focus { border-color: #4361ee; }

    /* Navigation */
    .step-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 22px;
      gap: 10px;
    }
    .nav-btn {
      padding: 11px 22px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.9em;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .nav-prev { background: #f0f2f5; color: #374151; }
    .nav-prev:hover { background: #e5e7eb; }
    .nav-next { background: #4361ee; color: #fff; flex: 1; }
    .nav-next:hover { background: #3451d1; }
    .nav-next:disabled { opacity: 0.5; cursor: not-allowed; }
    .nav-save { background: #28a745; color: #fff; flex: 1; }
    .nav-save:hover { background: #218838; }

    /* ── SKIP ── */
    .skip-row {
      width: 100%;
      max-width: 560px;
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }
    .skip-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.8em;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.65);
      transition: all 0.15s;
      text-align: center;
    }
    .skip-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* ── DONE ── */
    .done-card {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      color: #1a1a2e;
      display: none;
    }
    .done-icon { font-size: 3em; margin-bottom: 14px; }
    .done-title { font-size: 1.4em; font-weight: 700; margin-bottom: 8px; }
    .done-sub   { color: #6b7280; font-size: 0.9em; margin-bottom: 24px; }
    .done-btn   { display: inline-block; background: #4361ee; color: #fff; padding: 12px 28px; border-radius: 12px; font-weight: 700; font-size: 0.9em; cursor: pointer; border: none; font-family: inherit; }
    .done-btn:hover { background: #3451d1; }

    /* ── CARGANDO ── */
    #cargando { text-align: center; padding: 40px; color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>

  <div class="header">
    <div class="brand">Supratech · Formulario de Llamada</div>
    <a href="/">← Panel</a>
  </div>

  <div id="cargando">Cargando prospecto...</div>

  <!-- Contact info -->
  <div class="contact-card" id="contact-card" style="display:none">
    <div class="contact-info">
      <div class="c-empresa" id="c-empresa">—</div>
      <div class="c-meta"    id="c-meta">—</div>
    </div>
    <div class="contact-actions">
      <a href="#" id="btn-tel" class="c-btn c-btn-call">📞 Llamar</a>
      <a href="#" id="btn-wa"  class="c-btn c-btn-wa"  target="_blank">💬 WhatsApp</a>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progress-wrap" style="display:none">
    <div class="progress-steps" id="progress-steps"></div>
    <div class="progress-label" id="progress-label">Paso 1 de 7</div>
  </div>

  <!-- Step card -->
  <div class="step-card" id="step-card" style="display:none"></div>

  <!-- Skip row -->
  <div class="skip-row" id="skip-row" style="display:none">
    <button class="skip-btn" onclick="skipProspecto()">⏭ Saltar este prospecto</button>
    <button class="skip-btn" onclick="location.reload()">↺ Reiniciar</button>
  </div>

  <!-- Done -->
  <div class="done-card" id="done-card">
    <div class="done-icon">🎉</div>
    <div class="done-title">¡Llamada registrada!</div>
    <div class="done-sub" id="done-msg">Los datos quedaron guardados.</div>
    <button class="done-btn" onclick="nextCall()">Siguiente prospecto →</button>
  </div>

  <!-- Sin prospectos -->
  <div id="sin-prospectos" style="display:none;text-align:center;padding:60px 20px;color:rgba(255,255,255,0.6)">
    <div style="font-size:2.5em;margin-bottom:14px">✅</div>
    <div style="font-size:1em;font-weight:600">Sin prospectos pendientes</div>
    <div style="font-size:0.82em;margin-top:6px">Todos los contactos ya fueron llamados.</div>
    <a href="/" style="display:inline-block;margin-top:20px;background:#4361ee;color:#fff;padding:10px 24px;border-radius:10px;font-weight:600;font-size:0.85em;text-decoration:none">← Volver al panel</a>
  </div>

<script>
// ─── SCRIPT DE LLAMADA ─────────────────────────────────────────
const PASOS = [
  {
    id: 'respondio',
    pregunta: '¿Cómo resultó la llamada?',
    hint: 'Registra qué pasó al marcar el número.',
    opciones: [
      { emoji: '✅', label: 'Respondió' },
      { emoji: '📵', label: 'Buzón de voz' },
      { emoji: '🚫', label: 'Teléfono incorrecto' },
      { emoji: '🔄', label: 'No disponible ahora' },
    ]
  },
  {
    id: 'tipo_negocio',
    pregunta: '¿Es un negocio independiente o parte de una cadena?',
    hint: 'Trabajamos con negocios independientes. Cadenas (Oxxo, Farmacias GDL, Coppel, etc.) tienen sistemas corporativos propios — no son nuestro cliente.',
    opciones: [
      { emoji: '✅', label: 'Negocio independiente' },
      { emoji: '🏢', label: 'Franquicia o cadena regional' },
      { emoji: '❌', label: 'Cadena nacional (Oxxo, Chedraui, etc.)' },
    ],
    skipSi: ['Buzón de voz','Teléfono incorrecto','No disponible ahora']
  },
  {
    id: 'skus',
    pregunta: '¿Cuántos productos / SKUs manejan aproximadamente?',
    hint: 'Este es el calificador clave. Con +300 SKUs el sistema les genera valor inmediato.',
    opciones: [
      { emoji: '📦', label: 'Menos de 100 productos' },
      { emoji: '📦', label: '100 a 300 productos' },
      { emoji: '🏆', label: 'Más de 300 productos' },
      { emoji: '❓', label: 'No sabe / no quiso decir' },
    ],
    skipSi: ['Buzón de voz','Teléfono incorrecto','No disponible ahora',
             'Franquicia o cadena regional','Cadena nacional (Oxxo, Chedraui, etc.)']
  },
  {
    id: 'sistema_actual',
    pregunta: '¿Cómo manejan sus pedidos actualmente?',
    hint: 'Con más de 300 productos en Excel o WhatsApp, el caos es inevitable.',
    opciones: [
      { emoji: '📊', label: 'Excel / hojas de cálculo' },
      { emoji: '📱', label: 'WhatsApp / llamadas' },
      { emoji: '💻', label: 'Con un sistema (ERP/otro)' },
      { emoji: '📝', label: 'Sin sistema, todo manual' },
    ],
    skipSi: ['Buzón de voz','Teléfono incorrecto','No disponible ahora',
             'Franquicia o cadena regional','Cadena nacional (Oxxo, Chedraui, etc.)']
  },
  {
    id: 'pedidos_mes',
    pregunta: '¿Cuántos pedidos manejan al mes aproximadamente?',
    hint: 'Esto nos ayuda a calcular el ROI exacto. Un número aproximado está bien.',
    opciones: [
      { emoji: '📦', label: 'Menos de 50 pedidos' },
      { emoji: '📦', label: '50 a 200 pedidos' },
      { emoji: '📦', label: 'Más de 200 pedidos' },
      { emoji: '❓', label: 'No sabe / no quiso decir' },
    ],
    skipSi: ['Buzón de voz','Teléfono incorrecto','No disponible ahora',
             'Franquicia o cadena regional','Cadena nacional (Oxxo, Chedraui, etc.)']
  },
  {
    id: 'empleados',
    pregunta: '¿Cuántas personas trabajan en la empresa?',
    hint: 'Solo para dimensionar la operación.',
    opciones: [
      { emoji: '👥', label: '1 a 5 personas' },
      { emoji: '👥', label: '5 a 20 personas' },
      { emoji: '👥', label: '20 a 50 personas' },
      { emoji: '🏢', label: 'Más de 50 personas' },
    ],
    skipSi: ['Buzón de voz','Teléfono incorrecto','No disponible ahora',
             'Franquicia o cadena regional','Cadena nacional (Oxxo, Chedraui, etc.)']
  },
  {
    id: 'decisor',
    pregunta: '¿La persona que habló toma las decisiones de tecnología / compra?',
    hint: 'Si no es el decisor, obtén el nombre de la persona correcta.',
    opciones: [
      { emoji: '✅', label: 'Sí, yo decido' },
      { emoji: '🤔', label: 'Necesito consultarlo con alguien' },
      { emoji: '↗️', label: 'No, la persona es otra' },
    ],
    skipSi: ['Buzón de voz','Teléfono incorrecto','No disponible ahora',
             'Franquicia o cadena regional','Cadena nacional (Oxxo, Chedraui, etc.)']
  },
  {
    id: 'interes_demo',
    pregunta: '¿Le interesaría una demo gratuita de 15 minutos?',
    hint: '"Le muestro exactamente cómo Supratech funciona con negocios como el suyo — sin compromiso."',
    opciones: [
      { emoji: '🙌', label: 'Sí, me interesa mucho' },
      { emoji: '🤷', label: 'Quizás, mándame más información' },
      { emoji: '🙅', label: 'No por el momento' },
    ],
    skipSi: ['Buzón de voz','Teléfono incorrecto','No disponible ahora',
             'Franquicia o cadena regional','Cadena nacional (Oxxo, Chedraui, etc.)']
  },
  {
    id: 'agendo_demo',
    pregunta: '¿Agendamos la demo esta semana?',
    hint: 'Propón horarios concretos: "¿Te queda bien el martes a las 10am o el miércoles a las 4pm?"',
    opciones: [
      { emoji: '📅', label: 'Sí, esta semana' },
      { emoji: '📅', label: 'La próxima semana' },
      { emoji: '📞', label: 'Prefiero que me llamen después' },
      { emoji: '❌', label: 'No le interesa' },
    ],
    skipSi: ['Buzón de voz','Teléfono incorrecto','No disponible ahora','No por el momento',
             'Franquicia o cadena regional','Cadena nacional (Oxxo, Chedraui, etc.)']
  },
  {
    id: 'conclusion',
    pregunta: '¿Cuál es la conclusión de esta llamada?',
    hint: 'Selecciona el resultado final para clasificar al prospecto.',
    opciones: [
      { emoji: '🎯', label: 'Demo agendada' },
      { emoji: '⭐', label: 'Interesado - dar seguimiento' },
      { emoji: '💬', label: 'Enviar info por WhatsApp' },
      { emoji: '❌', label: 'No interesa' },
      { emoji: '🏢', label: 'No califica - Cadena/Franquicia' },
      { emoji: '📵', label: 'Buzón de voz' },
      { emoji: '🚫', label: 'Teléfono incorrecto' },
    ]
  }
];

let currentProspecto = null;
let skipCount        = 0;
let currentStep      = 0;
let respuestas       = {};

// ─── LOAD ────────────────────────────────────────
async function loadProspecto(skip = 0) {
  document.getElementById('cargando').style.display = 'block';
  document.getElementById('contact-card').style.display = 'none';
  document.getElementById('step-card').style.display    = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('skip-row').style.display     = 'none';
  document.getElementById('done-card').style.display    = 'none';
  document.getElementById('sin-prospectos').style.display = 'none';

  const res = await fetch(`/api/formulario/siguiente?skip=${skip}`);
  const d   = await res.json();
  document.getElementById('cargando').style.display = 'none';

  if (d.fin) {
    document.getElementById('sin-prospectos').style.display = 'block';
    return;
  }

  currentProspecto = d.prospecto;
  currentStep      = 0;
  respuestas       = {};
  skipCount        = skip;

  // Contact card
  const p  = currentProspecto;
  const tel = (p['Teléfono']||'').replace(/\D/g,'');
  const wa  = (p['WhatsApp']||p['Teléfono']||'').replace(/\D/g,'');
  const waMsg = encodeURIComponent(`Hola ${p['Nombre']||''}, te contacto de Supratech — el software de operaciones para distribuidoras mexicanas. ¿Tienes unos minutos?`);

  document.getElementById('c-empresa').textContent = p['Empresa'] || p['Nombre'] || '—';
  document.getElementById('c-meta').textContent    = [p['Giro'], p['Ciudad'], p['Empleados'] ? p['Empleados']+' emp.' : ''].filter(Boolean).join(' · ');
  document.getElementById('btn-tel').href = tel ? `tel:${tel}` : '#';
  document.getElementById('btn-wa').href  = wa  ? `https://wa.me/52${wa}?text=${waMsg}` : '#';

  document.getElementById('contact-card').style.display  = 'flex';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('step-card').style.display     = 'block';
  document.getElementById('skip-row').style.display      = 'flex';

  buildProgress();
  renderStep();
}

// ─── PROGRESS ────────────────────────────────────
function buildProgress() {
  const steps = document.getElementById('progress-steps');
  steps.innerHTML = PASOS.map((_, i) => `<div class="step-dot ${i === 0 ? 'active' : ''}" id="dot-${i}"></div>`).join('');
}

function updateProgress() {
  PASOS.forEach((_, i) => {
    const dot = document.getElementById('dot-' + i);
    if (!dot) return;
    dot.className = 'step-dot ' + (i < currentStep ? 'done' : i === currentStep ? 'active' : '');
  });
  document.getElementById('progress-label').textContent = `Paso ${currentStep + 1} de ${PASOS.length}`;
}

// ─── RENDER STEP ─────────────────────────────────
function renderStep() {
  const paso = PASOS[currentStep];
  const card = document.getElementById('step-card');
  const selected = respuestas[paso.id] || '';

  const opciones = paso.opciones.map(o => `
    <div class="option ${selected === o.label ? 'selected' : ''}" onclick="selectOption(this, '${esc(o.label)}')">
      <span class="opt-icon">${o.emoji}</span> ${o.label}
    </div>
  `).join('');

  const isLast = currentStep === PASOS.length - 1;

  card.innerHTML = `
    <div class="step-number">PASO ${currentStep + 1} DE ${PASOS.length}</div>
    <div class="step-question">${paso.pregunta}</div>
    <div class="step-hint">${paso.hint}</div>
    <div class="options">${opciones}</div>
    <div class="notas-wrap" id="notas-wrap" style="display:${isLast?'block':'none'}">
      <label>Notas adicionales (opcional)</label>
      <textarea id="campo-notas" rows="2" placeholder="Nombre del decisor, fecha de demo, observaciones...">${respuestas.notas||''}</textarea>
    </div>
    <div class="step-nav">
      ${currentStep > 0 ? `<button class="nav-btn nav-prev" onclick="prevStep()">← Atrás</button>` : '<div></div>'}
      ${isLast
        ? `<button class="nav-btn nav-save" onclick="guardarLlamada()">✓ Guardar llamada</button>`
        : `<button class="nav-btn nav-next" id="btn-next" onclick="nextStep()" ${selected ? '' : 'disabled'}>Siguiente →</button>`
      }
    </div>
  `;
}

function selectOption(el, label) {
  el.closest('.options').querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  respuestas[PASOS[currentStep].id] = label;
  const btn = document.getElementById('btn-next');
  if (btn) btn.disabled = false;
}

function nextStep() {
  const paso = PASOS[currentStep];
  if (!respuestas[paso.id]) { alert('Selecciona una opción para continuar.'); return; }

  // Auto-skip pasos no aplicables
  let next = currentStep + 1;
  while (next < PASOS.length - 1) {
    const sig = PASOS[next];
    if (sig.skipSi && sig.skipSi.includes(respuestas['respondio']) || sig.skipSi?.includes(respuestas['interes_demo'])) {
      next++;
    } else break;
  }
  currentStep = Math.min(next, PASOS.length - 1);
  updateProgress();
  renderStep();
}

function prevStep() {
  currentStep = Math.max(0, currentStep - 1);
  updateProgress();
  renderStep();
}

// ─── GUARDAR ─────────────────────────────────────
async function guardarLlamada() {
  if (!respuestas['conclusion']) { alert('Selecciona la conclusión de la llamada.'); return; }
  const notaEl = document.getElementById('campo-notas');
  respuestas.notas = notaEl ? notaEl.value.trim() : '';

  const body = {
    _row:         currentProspecto._row,
    empresa:      currentProspecto['Empresa'] || currentProspecto['Nombre'],
    ciudad:       currentProspecto['Ciudad']  || '',
    respondio:    respuestas.respondio     || '',
    skus:         respuestas.skus          || '',
    sistema_actual: respuestas.sistema_actual || '',
    pedidos_mes:  respuestas.pedidos_mes   || '',
    empleados:    respuestas.empleados     || '',
    decisor:      respuestas.decisor      || '',
    interes_demo: respuestas.interes_demo || '',
    agendo_demo:  respuestas.agendo_demo  || '',
    conclusion:   respuestas.conclusion,
    notas:        respuestas.notas,
  };

  const res = await fetch('/api/formulario/guardar', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  const d = await res.json();

  if (d.error) { alert('Error al guardar: ' + d.error); return; }

  document.getElementById('step-card').style.display     = 'none';
  document.getElementById('contact-card').style.display  = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('skip-row').style.display      = 'none';

  const isDemoAgendada = respuestas.conclusion === 'Demo agendada';
  document.getElementById('done-msg').textContent = isDemoAgendada
    ? '¡Demo agendada! El prospecto quedó marcado. Sigue con el siguiente.'
    : `Llamada registrada como: "${respuestas.conclusion}"`;

  document.getElementById('done-card').style.display = 'block';
}

function nextCall() {
  skipCount = 0;

function skipProspecto() {
  skipCount++;

}

function esc(s) { return String(s).replace(/'/g, "\\'"); }
